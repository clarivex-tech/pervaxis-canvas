name: Publish

on:
  push:
    tags: ['v*.*.*']

env:
  NODE_VERSION: '20.x'

jobs:
  publish:
    name: Build · Publish · Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write   # required for npm provenance attestation

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@pervaxis'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all libs
        run: npx nx run-many --target=build --all

      - name: Publish packages to GitHub Packages (with provenance)
        run: |
          find dist/libs -name "package.json" -mindepth 2 -maxdepth 4 | while read pkg; do
            dir=$(dirname "$pkg")
            echo "Publishing $dir …"
            npm publish "$dir" --access public --provenance
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Smoke test — install published packages
        run: |
          VERSION="${{ github.ref_name }}"
          WORK=$(mktemp -d)
          cd "$WORK"
          echo '{"name":"canvas-smoke-test","version":"1.0.0","private":true}' > package.json
          npm install \
            "@pervaxis/canvas-mfe-contracts@${VERSION}" \
            "@pervaxis/canvas-platform-http@${VERSION}" \
            --registry https://npm.pkg.github.com \
            --legacy-peer-deps
          # Verify package manifests are importable
          node -e "
            const c = require('@pervaxis/canvas-mfe-contracts/package.json');
            const h = require('@pervaxis/canvas-platform-http/package.json');
            if (!c.version || !h.version) process.exit(1);
            console.log('✅ canvas-mfe-contracts@' + c.version);
            console.log('✅ canvas-platform-http@' + h.version);
          "
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update RELEASE_NOTES.md
        run: |
          VERSION="${{ github.ref_name }}"
          DATE=$(date +%Y-%m-%d)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" -- libs/ apps/ | head -50)
          else
            CHANGES=$(git log --pretty=format:"- %s" HEAD | head -50)
          fi
          ENTRY="## ${VERSION} — ${DATE}\n\n${CHANGES}\n\n---\n\n"
          # Prepend to RELEASE_NOTES.md after the first heading line
          sed -i "2s|^|\n${ENTRY}|" RELEASE_NOTES.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RELEASE_NOTES.md
          git commit -m "chore(release): update RELEASE_NOTES for ${VERSION} [skip ci]"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true

  storybook:
    name: Build · Deploy Storybook
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npx nx run canvas-components-web:build-storybook

      - name: Deploy Storybook to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/storybook/canvas-components-web
          destination_dir: storybook
          commit_message: 'docs: deploy Storybook ${{ github.ref_name }} [skip ci]'
